<ion-header>
    <ion-title style="text-align: center; padding: 10px;">Partie terminée !</ion-title>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

    @if (players().length > 0) {
    <h3 style="margin-left: 8px;">Classement</h3>
    <ion-list>
        @for (player of rankedPlayers(); track player.id; let i = $index) {
        <ion-item [color]="player.id === myUserId() ? 'light' : ''">
            <ion-label>
            <strong>{{ medal(i) }} {{ player.alias }}</strong>
            @if (player.id === myUserId()) {
                <span style="color: var(--ion-color-medium);"> (toi)</span>
            }
            </ion-label>
            <ion-badge slot="end" [color]="i === 0 ? 'warning' : 'medium'">
            {{ player.score }} pts
            </ion-badge>
        </ion-item>
        }
    </ion-list>
    }

    <ion-button expand="block" style="margin-top: 32px;" (click)="goHome()">
    Retour à l'accueil
    </ion-button>

</ion-content>
